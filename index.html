<style>
  :root{
    --ink:#0d1318; --surface:#141d25; --surface-2:#1a242e; --surface-3:#212e39;
    --line:#2a3a47; --line-soft:#22303b;
    --text:#e7eef4; --muted:#a6b6c4; --faint:#8194a3;
    --teal:#3fb6a8; --teal-dim:#2e8d83; --teal-deep:#143d3a;
    --navy:#2c3e50; --navy-soft:#23323f;
    --green:#5ec48f; --green-deep:#143427;
    --red:#e07a83; --red-deep:#3a1c20;
    --amber:#d9a441; --amber-deep:#3a2e15;
    --shadow:0 10px 30px -12px rgba(0,0,0,.6);
    --r:14px;
  }
  [data-theme="light"]{
    --ink:#eef2f6; --surface:#ffffff; --surface-2:#f3f6f9; --surface-3:#e8eef4;
    --line:#d7e0e8; --line-soft:#e7edf2;
    --text:#16202b; --muted:#52616f; --faint:#7d8d9b;
    --teal:#138b80; --teal-dim:#1aa093; --teal-deep:#d9efec;
    --navy:#2c3e50; --navy-soft:#e4ebf1;
    --green:#1f9d5b; --green-deep:#e3f6ea;
    --red:#cf4750; --red-deep:#fcebec;
    --amber:#9a6b12; --amber-deep:#f8efd6;
    --shadow:0 10px 26px -14px rgba(20,40,60,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    font-size:15.5px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 500px at 80% -10%, rgba(63,182,168,.10), transparent 60%),
                     radial-gradient(700px 400px at -10% 0%, rgba(44,62,80,.35), transparent 55%);
    background-attachment:fixed;
  }
  .wrap{max-width:620px;margin:0 auto;padding:0 16px 120px;min-height:100%}
  .serif{font-family:'Newsreader',Georgia,serif}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}

  /* Header */
  header{position:sticky;top:0;z-index:30;background:linear-gradient(to bottom,var(--ink) 70%,transparent);
    padding:16px 0 10px;margin-bottom:6px}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand h1{font-family:'Newsreader',serif;font-weight:600;font-size:25px;letter-spacing:-.4px}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal);align-self:center}
  .brand small{color:var(--faint);font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .iconbtn{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);width:38px;height:38px;
    border-radius:11px;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .iconbtn:hover{color:var(--text);border-color:var(--teal-dim)}
  .iconrow{display:flex;gap:8px}
  svg.i{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Generic */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:16px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .row{display:flex;align-items:center;gap:10px}
  .between{justify-content:space-between}
  .wrapflex{display:flex;flex-wrap:wrap;gap:8px}
  .grow{flex:1}
  .sectlabel{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:22px 2px 10px}
  .pill{font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--surface-2)}
  .pill.teal{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-deep)}
  .pill.amber{color:var(--amber);border-color:#6b541f;background:var(--amber-deep)}
  .fade{animation:fade .32s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .stagger>*{animation:fade .3s ease both}
  .stagger>*:nth-child(2){animation-delay:.04s}
  .stagger>*:nth-child(3){animation-delay:.08s}
  .stagger>*:nth-child(4){animation-delay:.12s}
  .stagger>*:nth-child(5){animation-delay:.16s}
  .stagger>*:nth-child(6){animation-delay:.2s}

  button{font-family:inherit;color:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
    padding:13px 18px;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;width:100%}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#04211e;box-shadow:0 8px 20px -8px var(--teal-dim)}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:var(--surface-2);border:1px solid var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--teal-dim)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .btn-sm{padding:9px 14px;font-size:13.5px;width:auto;border-radius:10px}

  /* Subject card */
  .subj{cursor:pointer;transition:.15s;display:block;width:100%;text-align:left}
  .subj:hover{border-color:var(--teal-dim);transform:translateY(-2px)}
  .subj h3{font-family:'Newsreader',serif;font-size:19px;font-weight:600}
  .progressbar{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-top:11px}
  .progressbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:99px;transition:width .5s}
  .badge{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:8px}
  .badge.due{background:var(--amber-deep);color:var(--amber)}
  .badge.zero{background:var(--surface-3);color:var(--faint)}

  .stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat3 .card{text-align:center;padding:14px 8px}
  .stat3 .n{font-family:'Newsreader',serif;font-size:27px;font-weight:600;line-height:1}
  .stat3 .l{font-size:11px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-top:6px}
  .stat3 .n.teal{color:var(--teal)} .stat3 .n.amber{color:var(--amber)} .stat3 .n.green{color:var(--green)}

  /* Quiz */
  .qmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .stem{font-size:16.5px;line-height:1.62;margin:4px 0 6px}
  .stem b{color:#fff}
  .choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
  .choice{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--surface-2);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.13s;color:var(--text);font-size:15px}
  .choice:hover{border-color:var(--teal-dim)}
  .choice .lab{flex:none;width:26px;height:26px;border-radius:8px;background:var(--surface-3);border:1px solid var(--line);
    display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--muted)}
  .choice.sel{border-color:var(--teal);background:var(--teal-deep)}
  .choice.sel .lab{background:var(--teal);color:#04211e;border-color:var(--teal)}
  .choice.correct{border-color:var(--green);background:var(--green-deep)}
  .choice.correct .lab{background:var(--green);color:#04211e;border-color:var(--green)}
  .choice.wrong{border-color:var(--red);background:var(--red-deep)}
  .choice.wrong .lab{background:var(--red);color:#2a0c0f;border-color:var(--red)}
  .choice .vd{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:.06em;align-self:center}
  .choice.correct .vd{color:var(--green)} .choice.wrong .vd{color:var(--red)}

  /* Reveal blocks */
  .reveal{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .ansbox{background:var(--green-deep);border:1px solid #2c5f44;border-left:4px solid var(--green);border-radius:12px;padding:13px 15px}
  .ansbox .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);font-weight:800}
  .ansbox .v{font-family:'Newsreader',serif;font-size:18px;margin-top:3px}
  .block{border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden}
  .block .ttl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--muted);
    padding:11px 14px;border-bottom:1px solid var(--line-soft);background:var(--surface-2)}
  .block .body{padding:13px 14px;font-size:14.5px;line-height:1.6}
  .exp{font-size:13.6px;line-height:1.55;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line-soft)}
  .exp b{color:var(--text)}
  .keypoint{background:var(--amber-deep);border:1px solid #6b541f;border-left:4px solid var(--amber);border-radius:12px;padding:13px 15px}
  .keypoint .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);font-weight:800;display:flex;gap:7px;align-items:center}
  .keypoint .v{margin-top:5px;font-size:14.5px}
  .keydiff{background:var(--navy-soft);border:1px solid #34495e;border-radius:12px;padding:12px 15px;font-size:14px}
  .keydiff b{color:var(--teal)}
  .flag{border-radius:12px;padding:13px 15px;border:1px solid}
  .flag.HIGH{background:var(--amber-deep);border-color:#7a5e1c}
  .flag.CRITICAL{background:var(--red-deep);border-color:#6e2b30}
  .flag.MODERATE{background:#33310f33;border-color:#5c5a24}
  .flag .k{font-size:11.5px;font-weight:800;letter-spacing:.06em;display:flex;gap:7px;align-items:center}
  .flag.HIGH .k{color:var(--amber)} .flag.CRITICAL .k{color:var(--red)} .flag.MODERATE .k{color:#cbbf4a}
  .flag .vs{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap}
  .flag .tag{font-size:12px;font-weight:700;padding:4px 9px;border-radius:8px;background:#0006;border:1px solid #ffffff14}
  .flag .note{margin-top:9px;font-size:13.3px;color:var(--muted);line-height:1.5}
  table.sum{width:100%;border-collapse:collapse;font-size:13px}
  table.sum th,table.sum td{padding:8px 11px;border-bottom:1px solid var(--line-soft);text-align:left}
  table.sum th{color:var(--faint);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;background:var(--surface-2)}
  table.sum td:first-child{color:var(--muted);font-weight:600}

  /* SRS grade buttons */
  .grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
  .grade{border:1px solid var(--line);background:var(--surface-2);border-radius:11px;padding:11px 4px;cursor:pointer;text-align:center;transition:.13s}
  .grade:hover{transform:translateY(-2px)}
  .grade .gl{font-weight:800;font-size:13.5px}
  .grade .gi{font-size:10.5px;color:var(--faint);margin-top:2px}
  .grade.again{border-color:#6e2b30}.grade.again .gl{color:var(--red)}
  .grade.hard{border-color:#6b541f}.grade.hard .gl{color:var(--amber)}
  .grade.good{border-color:var(--teal-dim)}.grade.good .gl{color:var(--teal)}
  .grade.easy{border-color:#2c5f44}.grade.easy .gl{color:var(--green)}

  /* Sticky action footer */
  .foot{position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:linear-gradient(to top,var(--ink) 72%,transparent);padding:14px 16px calc(16px + env(safe-area-inset-bottom))}
  .foot-in{max-width:620px;margin:0 auto;display:flex;gap:10px}

  /* Exam */
  .timer{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:18px;letter-spacing:1px;
    background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:7px 13px}
  .timer.warn{color:var(--red);border-color:#6e2b30;animation:pulse 1s infinite}
  @keyframes pulse{50%{background:var(--red-deep)}}
  .palette{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-top:6px}
  .pcell{aspect-ratio:1;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);
    display:grid;place-items:center;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted);position:relative;transition:.12s}
  .pcell:hover{border-color:var(--teal-dim)}
  .pcell.answered{background:var(--teal-deep);border-color:var(--teal-dim);color:var(--teal)}
  .pcell.current{outline:2px solid var(--teal);outline-offset:1px}
  .pcell.flagged::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--amber)}
  .scorebig{font-family:'Newsreader',serif;font-size:54px;font-weight:600;line-height:1}
  .ring{--p:0;width:128px;height:128px;border-radius:50%;display:grid;place-items:center;margin:0 auto;
    background:conic-gradient(var(--teal) calc(var(--p)*1%), var(--surface-3) 0)}
  .ring .in{width:104px;height:104px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}

  .check{display:flex;gap:11px;align-items:center;background:var(--surface-2);border:1px solid var(--line);
    border-radius:12px;padding:13px 14px;cursor:pointer;transition:.13s}
  .check:hover{border-color:var(--teal-dim)}
  .check.on{border-color:var(--teal);background:var(--teal-deep)}
  .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
  .check.on .box{background:var(--teal);border-color:var(--teal)}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13px;padding:9px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--teal);color:#04211e}
  .inp{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:15px}
  textarea.inp{min-height:120px;resize:vertical;font-family:'IBM Plex Mono',monospace;font-size:12.5px}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:60;
    background:var(--surface-3);border:1px solid var(--teal-dim);color:var(--text);
    padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);animation:fade .25s ease}
  .empty{text-align:center;color:var(--faint);padding:30px 10px;font-size:14px}
  hr.sep{border:none;border-top:1px solid var(--line-soft);margin:16px 0}

  .modal-bg{position:fixed;inset:0;z-index:80;background:#000b;backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:620px;box-shadow:0 -12px 50px #000b}
  @media(min-width:560px){.modal-bg{align-items:center}.modal{border-radius:18px}}
  .rtype.on{border-color:var(--teal);color:var(--teal);background:var(--teal-deep)}
  .reportlink{background:none;border:none;color:var(--faint);font-size:12.5px;cursor:pointer;padding:6px;text-decoration:underline;text-underline-offset:3px;font-family:inherit}
  .reportlink:hover{color:var(--muted)}
  .wallsw{width:52px;height:38px;border-radius:10px;border:2px solid var(--line);cursor:pointer;padding:0;color:var(--muted);font-size:18px;font-weight:700;background-size:cover;background-position:center}
  .wallsw.on{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-deep)}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .segbtn{border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13px;padding:6px 15px;border-radius:7px;cursor:pointer;transition:.12s}
  .segbtn.on{background:var(--teal);color:#04211e}
  .emqtag{background:var(--navy-soft);color:var(--text);font-weight:800}
  .optstitle{font-weight:700;font-size:13px;color:var(--teal);background:var(--teal-deep);border:1px solid var(--teal-dim);border-radius:10px;padding:9px 12px;margin:8px 0 4px}
  .optshdr{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:8px 0 8px}
  .choice.opt{padding-top:10px;padding-bottom:10px}
  .sainput{width:100%;min-height:130px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;color:var(--text);padding:12px 14px;font-size:15px;font-family:inherit;line-height:1.5;resize:vertical}
  .sainput:focus{outline:none;border-color:var(--teal-dim)}
  .searchbox{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;color:var(--text);padding:13px 15px;font-size:15px;font-family:inherit}
  .searchbox:focus{outline:none;border-color:var(--teal-dim)}
  .ach-ic{flex:none;width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;font-size:23px}
  .rank{flex:none;width:30px;height:30px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-weight:800;font-size:14px;color:var(--muted)}
  .switch{width:50px;height:30px;border-radius:999px;background:var(--surface-3);border:1px solid var(--line);position:relative;cursor:pointer;transition:.16s;flex:none}
  .switch.on{background:var(--teal)}
  .switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.16s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch.on .knob{left:25px}
  .heat{font-size:11.5px;font-weight:700;padding:5px 9px;border-radius:8px;white-space:nowrap}
  .subjtag{font-size:11px;font-weight:700;color:var(--teal);background:var(--teal-deep);padding:3px 8px;border-radius:7px}
  .chip{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer}
  .chip.on{background:var(--teal);color:#04211e;border-color:var(--teal)}
  .firebadge{font-size:10.5px;font-weight:800;color:var(--amber);background:var(--amber-deep);padding:2px 8px;border-radius:999px;white-space:nowrap}

  /* gamification + suggestions */
  .levelcard{background:linear-gradient(135deg,var(--teal-deep),var(--surface));border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px}
  .lvlbadge{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#04211e;display:grid;place-items:center;font-family:'Newsreader',serif;font-weight:600;font-size:20px;box-shadow:0 6px 14px -6px var(--teal-dim)}
  .streakpill{display:flex;align-items:center;gap:5px;background:var(--amber-deep);color:var(--amber);font-weight:800;font-size:14px;padding:6px 12px;border-radius:999px}
  .streakpill svg{width:15px;height:15px;stroke:var(--amber);fill:none;stroke-width:2}
  .sugg{cursor:pointer;transition:.14s}
  .sugg:hover{border-color:var(--teal-dim);transform:translateY(-2px)}
  .suggicon{flex:none;width:38px;height:38px;border-radius:11px;background:var(--teal-deep);color:var(--teal);display:grid;place-items:center;font-size:17px;font-weight:800}
  .confetti{position:fixed;inset:0;z-index:90;pointer-events:none}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.035)}100%{transform:scale(1)}}
  .choice.correct{animation:pop .4s ease}
  .celebrate{text-align:center;padding-top:18px}
  .celebrate .big{font-family:'Newsreader',serif;font-size:30px;font-weight:600}
  .xpgain{display:inline-block;background:var(--teal-deep);color:var(--teal);font-weight:800;border-radius:999px;padding:7px 16px;font-size:16px;margin-top:8px}

  /* delight / gamification */
  @keyframes pop{0%{transform:scale(.97)}55%{transform:scale(1.03)}100%{transform:scale(1)}}
  .choice.correct{animation:pop .4s ease}
  .xpfloat{position:fixed;left:50%;top:40%;transform:translateX(-50%);z-index:70;font-family:'Newsreader',serif;font-weight:600;font-size:36px;color:var(--green);pointer-events:none;animation:xpf 1s ease forwards;text-shadow:0 2px 16px rgba(0,0,0,.4)}
  @keyframes xpf{0%{opacity:0;transform:translate(-50%,12px) scale(.8)}25%{opacity:1}100%{opacity:0;transform:translate(-50%,-46px) scale(1.12)}}
  .lvlbadge{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--teal-dim));color:#04211e;display:grid;place-items:center;font-family:'Newsreader',serif;font-weight:600;font-size:20px;flex:none}
  .xpbar{height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-top:7px}
  .xpbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-dim),var(--teal));border-radius:99px;transition:width .6s}
  .goalring{--p:0;width:60px;height:60px;border-radius:50%;flex:none;background:conic-gradient(var(--teal) calc(var(--p)*1%), var(--surface-3) 0);display:grid;place-items:center}
  .goalring .in{width:48px;height:48px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center;line-height:1}
  .confetti{position:fixed;inset:0;z-index:65;pointer-events:none;overflow:hidden}
  .conf{position:absolute;top:-20px;width:9px;height:14px;border-radius:2px;opacity:.95;animation:fall linear forwards}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(106vh) rotate(560deg)}}
  .cta{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--teal-dim);background:linear-gradient(135deg,var(--teal-deep),transparent);border-radius:var(--r);padding:15px 16px;cursor:pointer;color:var(--text);transition:.15s}
  .cta:hover{transform:translateY(-2px)}
  .cta .em{font-size:22px}
</style>
</head>
