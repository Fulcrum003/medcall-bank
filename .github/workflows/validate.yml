name: Validate question packs

# Non-blocking: this NEVER stops GitHub Pages from publishing.
# It just checks every push and, if a pack is broken, opens a GitHub Issue
# telling you exactly what is wrong. The Issue auto-closes when you fix it.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validator (non-blocking)
        id: val
        run: |
          set +e
          node validate.mjs | tee validate_output.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validate_output.txt

      - name: Open or update an Issue when problems are found
        if: steps.val.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('validate_output.txt', 'utf8');
            const errLines = out.split('\n').filter(l => l.trim().startsWith('X ')).slice(0, 120).join('\n');
            const marker = '<!-- medcall-pack-validation -->';
            const sha = context.sha.slice(0, 7);
            const lines = [
              marker,
              '',
              '⚠️ **The validator found problems in the latest push** (commit `' + sha + '`).',
              '',
              'The bank is **still live** — this is only a heads-up, not a block. Fix the items below and push again; this Issue closes itself automatically once validation passes.',
              '',
              '```',
              (errLines || out.slice(-3500)),
              '```',
              '',
              '_The full report is attached as the “validation-report” artifact on the workflow run._'
            ];
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const list = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = list.data.find(i => i.body && i.body.includes(marker));
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: '🔁 Still failing as of `' + sha + '`.' });
            } else {
              await github.rest.issues.create({ owner, repo, title: '⚠️ Pack validation problems', body });
            }

      - name: Close the Issue when validation passes
        if: steps.val.outputs.code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- medcall-pack-validation -->';
            const { owner, repo } = context.repo;
            const list = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            for (const i of list.data.filter(x => x.body && x.body.includes(marker))) {
              await github.rest.issues.createComment({ owner, repo, issue_number: i.number, body: '✅ Validation now passes — closing.' });
              await github.rest.issues.update({ owner, repo, issue_number: i.number, state: 'closed' });
            }
